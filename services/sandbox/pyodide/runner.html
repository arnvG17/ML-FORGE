<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge Pyodide Runner</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'JetBrains Mono', monospace; }
        #output { padding: 24px; white-space: pre-wrap; font-size: 13px; }
        #status { padding: 12px 24px; color: #888; font-size: 11px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
    <div id="status">Initializing Pyodide...</div>
    <div id="output"></div>

    <script>
        let pyodide = null;

        async function initPyodide() {
            const status = document.getElementById('status');
            const output = document.getElementById('output');

            try {
                pyodide = await loadPyodide();
                await pyodide.loadPackage(['numpy', 'matplotlib']);
                status.textContent = 'Ready';
            } catch (e) {
                status.textContent = 'Error loading Pyodide: ' + e.message;
            }
        }

        async function runScript(script) {
            const status = document.getElementById('status');
            const output = document.getElementById('output');

            if (!pyodide) {
                output.textContent = JSON.stringify({ errors: ['Pyodide not initialized'] });
                return;
            }

            status.textContent = 'Running...';

            try {
                pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
`);
                pyodide.runPython(script);

                const stdout = pyodide.runPython('sys.stdout.getvalue()');
                output.textContent = stdout;
                status.textContent = 'Done';

                if (window.parent !== window) {
                    window.parent.postMessage({
                        type: 'forge-execution-result',
                        data: stdout,
                    }, '*');
                }
            } catch (e) {
                const errorResult = JSON.stringify({
                    metrics: {},
                    plots: {},
                    controls: [],
                    errors: [e.message],
                });
                output.textContent = errorResult;
                status.textContent = 'Error';

                if (window.parent !== window) {
                    window.parent.postMessage({
                        type: 'forge-execution-result',
                        data: errorResult,
                    }, '*');
                }
            }
        }

        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'forge-run-script') {
                runScript(event.data.script);
            }
        });

        initPyodide();
    </script>
</body>
</html>
